<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Income Calculator (คำนวณรายได้ประจำวัน)</title>
  
  <!-- ดึง html2canvas สำหรับใช้เซฟรูปภาพเป็น PNG -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #f2f2f2;
      margin: 0;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 600px;
      width: 100%;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    h2 {
      font-size: 22px;
      color: #003300;
      margin: 0 0 10px;
    }
    h3 {
      margin-top: 20px;
      font-size: 18px;
      color: #004d00;
    }
    label {
      display: block;
      margin-top: 10px;
      font-size: 14px;
    }
    input, button, select {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      margin-top: 10px;
      cursor: pointer;
      color: white;
      border: none;
      font-weight: bold;
    }
    .btn-calc { background-color: #28a745; margin-top: 15px; }
    .btn-calc:hover { background-color: #218838; }
    
    .btn-save { background-color: #007bff; }
    .btn-save:hover { background-color: #0069d9; }
    
    .btn-reset { background-color: #6c757d; }
    .btn-reset:hover { background-color: #5a6268; }

    .btn-danger { background-color: #dc3545; padding: 8px; font-size: 14px; }
    .btn-danger:hover { background-color: #bd2130; }

    /* กรอบสีเขียวสำหรับแสดงผลลัพธ์ */
    .result {
      margin-top: 20px;
      background: #e6ffe6;
      padding: 15px;
      border-radius: 5px;
      color: #006600;
      font-size: 14px;
      line-height: 1.6;
      display: none; /* ซ่อนไว้ก่อนคำนวณ */
    }
    
    .history-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 14px;
    }
    .history-table th, .history-table td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }
    .history-table th {
      background-color: #f8f9fa;
      color: #333;
    }
    .history-table tr:hover {
      background-color: #f1f1f1;
    }
    .action-btns {
      display: flex;
      gap: 5px;
    }
    .btn-view {
      background-color: #17a2b8;
      padding: 5px 10px;
      font-size: 12px;
      margin: 0;
      width: auto;
    }
    .btn-del {
      background-color: #dc3545;
      padding: 5px 10px;
      font-size: 12px;
      margin: 0;
      width: auto;
    }

    @media (max-width: 500px) {
      h2 { font-size: 20px; }
      input, button, select { font-size: 14px; padding: 10px; }
      .result { font-size: 13px; }
      .history-table { font-size: 12px; }
      .btn-view, .btn-del { padding: 4px 6px; font-size: 11px; }
    }
  </style>
</head>
<body>

  <!-- ส่วนของตัวโปรแกรมคำนวณ (เริ่มจากวันที่ทันที) -->
  <div class="container">
    <label>วันที่:</label>
    <input type="date" id="date" />
    
    <h3>รายรับ</h3>
    <label>รายได้จาก GRAB (บาท):</label>
    <input type="number" id="grab" />
    <label>รายได้จาก BOLT (บาท):</label>
    <input type="number" id="bolt" />
    <label>ทิป (บาท):</label>
    <input type="number" id="tip" />
    <label>รายรับอื่นๆ (บาท):</label>
    <input type="number" id="extraIncome" />
    
    <h3>รายจ่าย</h3>
    <label>ค่าน้ำมัน (บาท):</label>
    <input type="number" id="oil" />
    <label>รายจ่ายอื่นๆ (บาท):</label>
    <input type="number" id="otherExpense" />
    
    <h3>ระยะทางที่ใช้</h3>
    <label>เริ่มงาน (กม.):</label>
    <input type="number" id="startKm" />
    <label>เลิกงาน (กม.):</label>
    <input type="number" id="endKm" />
    <label>หรือ:</label>
    <label>ระยะทางที่ใช้ (กม.):</label>
    <input type="number" id="distance1" />
    
    <button class="btn-calc" onclick="calculateAndSave()">คำนวณและบันทึกประวัติ</button>
    <button class="btn-save" onclick="saveAsPNG()">บันทึกรูปภาพสรุปผล (PNG)</button>
    <button class="btn-reset" onclick="resetForm()">ล้างหน้าจอ</button>
    
    <!-- กรอบสีเขียวที่จะถูกดึงไปเซฟเป็นไฟล์ภาพ -->
    <div class="result" id="result"></div>
  </div>

  <!-- ส่วนแสดงประวัติย้อนหลัง -->
  <div class="container">
    <h2>📊 ประวัติย้อนหลัง</h2>
    <button class="btn-danger" style="width: auto; float: right;" onclick="clearAllHistory()">ล้างประวัติทั้งหมด</button>
    <div style="clear: both;"></div>
    
    <div style="overflow-x: auto;">
      <table class="history-table">
        <thead>
          <tr>
            <th>วันที่</th>
            <th>รายได้สุทธิ</th>
            <th>ระยะทาง</th>
            <th>จัดการ</th>
          </tr>
        </thead>
        <tbody id="history-list">
          <!-- ข้อมูลประวัติจะถูกใส่เข้ามาด้วย JavaScript -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      // ตั้งค่าวันที่ปัจจุบันในช่อง Input เป็นค่าเริ่มต้น
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('date').value = today;
      displayHistory();
    });

    function calculateAndSave() {
      const date = document.getElementById('date').value;
      if (!date) {
        alert("กรุณาเลือกวันที่ก่อนทำการคำนวณ");
        return;
      }

      const grab = parseFloat(document.getElementById('grab').value) || 0;
      const bolt = parseFloat(document.getElementById('bolt').value) || 0;
      const tip = parseFloat(document.getElementById('tip').value) || 0;
      const extraIncome = parseFloat(document.getElementById('extraIncome').value) || 0;
      const oil = parseFloat(document.getElementById('oil').value) || 0;
      const otherExpense = parseFloat(document.getElementById('otherExpense').value) || 0;
      const startKm = parseFloat(document.getElementById('startKm').value) || 0;
      const endKm = parseFloat(document.getElementById('endKm').value) || 0;
      const distanceInput = parseFloat(document.getElementById('distance1').value) || 0;

      let distance = 0;
      if (endKm > 0 && startKm > 0) {
        distance = endKm - startKm;
        if (distance < 0) {
          alert("กรุณากรอกเลขกิโลเมตรให้ถูกต้อง (เลิกงานต้องมากกว่าเริ่มงาน)");
          return;
        }
      } else if (distanceInput > 0) {
        distance = distanceInput;
      }

      const totalIncomeBeforeCommission = grab + bolt + tip + extraIncome;
      const boltCommission = bolt * 0.1926; // หักคอม 19.26%
      const boltAfter = bolt - boltCommission;
      
      const totalIncomeBeforeMaintenance = grab + boltAfter + extraIncome;
      const maintenance = totalIncomeBeforeMaintenance * 0.10;
      const totalExpenses = oil + otherExpense + maintenance;
      const netIncome = totalIncomeBeforeMaintenance - totalExpenses + tip;
      const halfIncomePlusMaintenance = (netIncome / 2 + maintenance).toFixed(2);
      const halfIncome = (netIncome / 2).toFixed(2);
      const costPerKm = distance > 0 ? (totalIncomeBeforeCommission / distance).toFixed(2) : "0.00";

      // แสดงผลบนหน้าจอและเปิดกล่องสีเขียว
      renderResultHTML(date, grab, bolt, boltCommission, boltAfter, extraIncome, tip, totalIncomeBeforeCommission, totalIncomeBeforeMaintenance, maintenance, oil, otherExpense, totalExpenses, netIncome, halfIncomePlusMaintenance, halfIncome, distance, costPerKm);

      // บันทึกลง LocalStorage
      const record = {
        date, grab, bolt, tip, extraIncome, oil, otherExpense, startKm, endKm, distance1: distanceInput, netIncome, distance
      };
      
      saveToLocalStorage(record);
    }

    function renderResultHTML(date, grab, bolt, boltCommission, boltAfter, extraIncome, tip, totalIncomeBeforeCommission, totalIncomeBeforeMaintenance, maintenance, oil, otherExpense, totalExpenses, netIncome, halfIncomePlusMaintenance, halfIncome, distance, costPerKm) {
      const format = n => n.toLocaleString(undefined, { minimumFractionDigits: 2 });
      const resultDiv = document.getElementById('result');
      
      resultDiv.innerHTML = `
        <strong>สรุปผลประจำวันที่: ${date}</strong><br><br>
        <strong>รายรับ</strong><br>
        GRAB: ${format(grab)} บาท<br>
        BOLT: ${format(bolt)} บาท (หัก 19.26%: ${format(boltCommission)} บาท เหลือ: ${format(boltAfter)} บาท)<br>
        รายรับอื่นๆ: ${format(extraIncome)} บาท<br>
        ทิป: ${format(tip)} บาท<br>
        รวมรายรับก่อนหักค่าคอมมิชชั่น: ${format(totalIncomeBeforeCommission)} บาท<br>
        รวมรายรับก่อนหักค่าซ่อม: ${format(totalIncomeBeforeMaintenance)} บาท<br><br>
        <strong>รายจ่าย</strong><br>
        ค่าซ่อม 10%: ${format(maintenance)} บาท<br>
        ค่าน้ำมัน: ${format(oil)} บาท<br>
        รายจ่ายอื่นๆ: ${format(otherExpense)} บาท<br>
        <strong>ค่าคอมมิชชั่น BOLT (19.26%):</strong> ${format(boltCommission)} บาท<br>
        <strong>รวมรายจ่ายทั้งหมด:</strong> ${format(totalExpenses)} บาท<br><br>
        <strong>รายได้สุทธิ:</strong> ${format(netIncome)} บาท<br>
        <strong>ทิป:</strong> ${format(tip)} บาท<br>
        <strong>หาร 2 + ค่าซ่อม:</strong> ${format(parseFloat(halfIncomePlusMaintenance))} บาท<br>
        <strong>หาร 2:</strong> ${format(parseFloat(halfIncome))} บาท<br><br>
        ระยะทางที่ใช้: ${distance} กม.<br>
        บาทต่อกิโลเมตร: ${costPerKm} บาท/กม.
      `;
      resultDiv.style.display = 'block'; // แสดงผลกล่องสีเขียว
    }

    function saveToLocalStorage(newRecord) {
      let history = JSON.parse(localStorage.getItem("income_history")) || [];
      const existingIndex = history.findIndex(item => item.date === newRecord.date);
      if (existingIndex !== -1) {
        history[existingIndex] = newRecord;
      } else {
        history.push(newRecord);
      }
      history.sort((a, b) => new Date(b.date) - new Date(a.date));
      localStorage.setItem("income_history", JSON.stringify(history));
      displayHistory();
    }

    function displayHistory() {
      const history = JSON.parse(localStorage.getItem("income_history")) || [];
      const historyList = document.getElementById("history-list");
      historyList.innerHTML = "";

      if (history.length === 0) {
        historyList.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#999;">ยังไม่มีประวัติการบันทึก</td></tr>`;
        return;
      }

      history.forEach((item, index) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${item.date}</td>
          <td style="color: #006600; font-weight: bold;">${item.netIncome.toLocaleString(undefined, { minimumFractionDigits: 2 })} บาท</td>
          <td>${item.distance} กม.</td>
          <td class="action-btns">
            <button class="btn-view" onclick="viewHistoryItem(${index})">ดู</button>
            <button class="btn-del" onclick="deleteHistoryItem(${index})">ลบ</button>
          </td>
        `;
        historyList.appendChild(tr);
      });
    }

    function viewHistoryItem(index) {
      const history = JSON.parse(localStorage.getItem("income_history")) || [];
      const item = history[index];

      document.getElementById('date').value = item.date;
      document.getElementById('grab').value = item.grab || '';
      document.getElementById('bolt').value = item.bolt || '';
      document.getElementById('tip').value = item.tip || '';
      document.getElementById('extraIncome').value = item.extraIncome || '';
      document.getElementById('oil').value = item.oil || '';
      document.getElementById('otherExpense').value = item.otherExpense || '';
      document.getElementById('startKm').value = item.startKm || '';
      document.getElementById('endKm').value = item.endKm || '';
      document.getElementById('distance1').value = item.distance1 || '';

      calculateAndSave();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteHistoryItem(index) {
      if (confirm("คุณแน่ใจหรือไม่ว่าต้องการลบประวัติรายการนี้?")) {
        let history = JSON.parse(localStorage.getItem("income_history")) || [];
        history.splice(index, 1);
        localStorage.setItem("income_history", JSON.stringify(history));
        displayHistory();
      }
    }

    function clearAllHistory() {
      if (confirm("⚠️ คุณต้องการลบประวัติทั้งหมดใช่หรือไม่? ข้อมูลนี้ไม่สามารถกู้คืนได้")) {
        localStorage.removeItem("income_history");
        displayHistory();
        document.getElementById('result').style.display = 'none';
        document.getElementById('result').innerHTML = '';
      }
    }

    // ฟังก์ชันสำคัญ: บันทึกภาพเฉพาะกรอบสีเขียวผลลัพธ์เท่านั้น
    function saveAsPNG() {
      const target = document.getElementById('result');
      
      // ตรวจสอบว่ามีข้อมูลผลลัพธ์แสดงอยู่หรือไม่ก่อนเซฟภาพ
      if (target.innerHTML === "" || target.style.display === 'none') {
        alert("กรุณากด 'คำนวณและบันทึกประวัติ' เพื่อให้ระบบสร้างสรุปผลก่อนบันทึกรูปภาพ");
        return;
      }
      
      html2canvas(target, {
        scale: 2, 
        useCORS: true,
        backgroundColor: "#e6ffe6" // ตั้งค่าพื้นหลังเป็นสีเขียวอ่อนตามธีมสรุปผล
      }).then(canvas => {
        const link = document.createElement('a');
        const dateInput = document.getElementById('date').value || 'daily-summary';
        link.download = `สรุปรายได้_${dateInput}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      }).catch(err => {
        alert('เกิดข้อผิดพลาดในการบันทึกรูปภาพ กรุณาลองใหม่อีกครั้ง');
        console.error(err);
      });
    }

    function resetForm() {
      document.querySelectorAll('input:not(#date)').forEach(input => input.value = '');
      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'none';
      resultDiv.innerHTML = '';
    }
  </script>
</body>
</html>
